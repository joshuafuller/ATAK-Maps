name: Map Health Check

on:
  schedule:
    - cron: "0 0 * * 0"  # Sunday midnight UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run liveness probes and manage issues
        run: uv run python -m mapvalidator --probe --issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
