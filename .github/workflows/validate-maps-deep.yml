name: Deep Map Validation

on:
  pull_request:
    paths: ["**/*.xml", "mapvalidator/**", "tests/**"]
  push:
    branches: [master]
    paths: ["**/*.xml"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run deep validation (XML checks only)
        run: uv run python -m mapvalidator
