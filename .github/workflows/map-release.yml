# Triggers whenever an XML map file is pushed to `master`
# (or when you run the workflow manually).
#
# Flow:
#   1. Sanity-check: latest git tag must be on this branch
#   2. Zips every *.xml map into dist/atak-maps.zip
#   3. semantic-release
#        • calculates the next SemVer
#        • tags the commit
#        • creates / updates the GitHub Release
#        • uploads the ZIP as an asset
#
# NOTE: The companion .releaserc.json must include @semantic-release/github
#       with the matching asset block.

name: Map Release

on:
  push:
    branches: [master]
    paths: "**/*.xml"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues:   write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master          # Always use latest master tip, not the triggering SHA.
          fetch-depth: 0       # @semantic-release/git may have pushed a chore(release)
          fetch-tags: true     # commit since the push that triggered this run.

      # Defense-in-depth: abort if the latest tag isn't reachable from HEAD.
      # This catches history rewrites that orphan tags (e.g. filter-branch).
      - name: Verify tag ancestry
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No version tags found — first release, proceeding."
            exit 0
          fi
          echo "Latest tag: $LATEST_TAG"
          if ! git merge-base --is-ancestor "$LATEST_TAG" HEAD; then
            echo "::error::Tag $LATEST_TAG is NOT an ancestor of HEAD. Tags may have been orphaned by a history rewrite. Fix tags before releasing."
            exit 1
          fi
          echo "Tag $LATEST_TAG is reachable from HEAD — safe to release."

      - name: Build ZIP of maps
        run: |
          mkdir -p dist
          # Use null-delimited find to handle spaces in filenames
          git ls-files -z '*.xml' | xargs -0 zip dist/atak-maps.zip

      - name: semantic-release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
